<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Contacto | Flora Salon</title>

    <link rel="stylesheet"
    href="../../assets/css/contacto.css">

</head>

<body>

<a href="../../index.html" class="btn-back">
    ←
</a>
<div class="logo-flora">

    <img
    src="https://thumbs.dreamstime.com/b/flor-de-c%C3%ADrculo-femenino-concepto-floral-pelo-rostro-perfil-y-flores-peluquer%C3%ADa-belleza-spa-o-similar-280378869.jpg"
    alt="Logo Flora Salon"
    class="logo-img">

</div>

<div class="contacto-container">

    <h1>Contáctanos</h1>

    <p>
        Estamos listas para atenderte y ayudarte a resaltar tu belleza.
    </p>

    <div class="contacto-grid">

        <div class="info-card">

            <h3>📍 Dirección</h3>

            <p>
                Av. Flora #123<br>
                Los Reyes, Estado de México
            </p>

        </div>

        <div class="info-card">

            <h3>📞 Teléfono</h3>

            <p>
                +52 55 1234 5678
            </p>

        </div>

        <div class="info-card">

            <h3>📧 Correo</h3>

            <p>
                contacto@florasalon.com
            </p>

        </div>

        <div class="info-card">

            <h3>🕒 Horario</h3>

            <p>
                Lun - Sáb<br>
                9:00 AM - 8:00 PM
            </p>

        </div>

    </div>

    <form class="contact-form">

        <input
        type="text"
        placeholder="Nombre completo"
        required>

        <input
        type="email"
        placeholder="Correo electrónico"
        required>

        <textarea
        rows="5"
        placeholder="Escribe tu mensaje..."
        required>
        </textarea>

        <button type="submit">
            Enviar Mensaje
        </button>

    </form>

</div>
<footer>

    <p>
        © 2026 Flora Salon | Todos los derechos reservados
    </p>

</footer>
</body>
</html>
