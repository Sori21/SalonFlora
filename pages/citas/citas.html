<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reservar Cita - Salón Flora</title>

    <link rel="stylesheet" href="../../assets/css/citas.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="row shadow-lg rounded-4 overflow-hidden">

        <!-- IMAGEN LATERAL -->
        <div class="col-md-5 p-0">
            <img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702"
                 class="img-fluid h-100 object-fit-cover"
                 style="min-height:100%; object-fit:cover;">
        </div>

        <!-- FORMULARIO -->
        <div class="col-md-7 p-4 flora-panel">

            <h2 class="text-center mb-3">🌸 Reserva tu cita</h2>
            <p class="text-center text-muted">Selecciona servicio, especialista, fecha y horario disponible</p>

            <!-- SERVICIOS -->
           <label class="form-label mt-2">Servicio</label>

<select class="form-select" id="servicio">
    <option value="">Cargando servicios...</option>
</select>
            <!-- EMPLEADO -->

<label class="form-label mt-3">
    Especialista
</label>

<div class="empleados-grid" id="empleadosGrid">

</div>
            <!-- FECHA -->
            <label class="form-label mt-3">Fecha</label>
            <input type="date" class="form-control">

            <!-- HORARIOS -->
            <label class="form-label mt-3">Horarios disponibles</label>

            <div class="d-flex flex-wrap gap-2">

                <button class="btn hora-btn">10:00</button>
                <button class="btn hora-btn">11:00</button>
                <button class="btn hora-btn ocupado" disabled>12:00</button>
                <button class="btn hora-btn">13:00</button>
                <button class="btn hora-btn">14:00</button>
                <button class="btn hora-btn">15:00</button>

            </div>

            <!-- BOTÓN -->
            <button id="btnConfirmar" class="btn btn-flora w-100 mt-4"> Confirmar cita 🌸</button>

        </div>

    </div>
</div>
<script>
const API = "http://localhost:3000/api";

// =========================
// CARGAR SERVICIOS
// =========================
async function cargarServicios() {

    try {

        const respuesta =
            await fetch(`${API}/servicios`);

        const servicios =
            await respuesta.json();

        const select =
            document.getElementById("servicio");

        select.innerHTML =
            '<option value="">Seleccione un servicio</option>';

        servicios.forEach(servicio => {

            select.innerHTML += `
                <option value="${servicio.IdServicio}">
                    ${servicio.Nombre}
                </option>
            `;

        });

    } catch (error) {

        console.error(
            "Error cargando servicios",
            error
        );

    }

}

// =========================
// CARGAR EMPLEADOS
// =========================
async function cargarEmpleados() {

    try {

        const respuesta =
            await fetch(`${API}/empleados`);

        const empleados =
            await respuesta.json();

        const contenedor =
            document.getElementById("empleadosGrid");

        contenedor.innerHTML = "";

        empleados.forEach(emp => {

            contenedor.innerHTML += `

                <div
                    class="empleado-card"
                    data-id="${emp.IdEmpleado}"
                >

                    <h6>${emp.Nombre}</h6>

                    <p>${emp.Especialidad}</p>

                    <small>
                        📞 ${emp.Telefono}
                    </small>

                </div>

            `;

        });

        activarSeleccionEmpleado();

    } catch (error) {

        console.error(
            "Error cargando empleados",
            error
        );

    }

}

// =========================
// SELECCIONAR EMPLEADO
// =========================
let empleadoSeleccionado = null;

function activarSeleccionEmpleado() {

    const tarjetas =
        document.querySelectorAll(".empleado-card");

    tarjetas.forEach(card => {

        card.addEventListener("click", () => {

            tarjetas.forEach(c =>
                c.classList.remove("selected")
            );

            card.classList.add("selected");

            empleadoSeleccionado =
                card.dataset.id;

        });

    });

}

// =========================
// HORARIOS
// =========================
let botones =
document.querySelectorAll(
    ".hora-btn:not(.ocupado)"
);

botones.forEach(btn => {

    btn.addEventListener("click", e => {

        e.preventDefault();

        botones.forEach(b =>
            b.classList.remove("active")
        );

        btn.classList.add("active");

    });

});

// =========================
// INICIAR
// =========================
cargarServicios();
cargarEmpleados();

document
.getElementById("btnConfirmar")
.addEventListener("click", reservarCita);

async function reservarCita() {

    try {

        const servicio =
            document.getElementById("servicio").value;

        const fecha =
            document.querySelector(
                'input[type="date"]'
            ).value;

        const horaSeleccionada =
            document.querySelector(
                ".hora-btn.active"
            );

        if(!servicio){

            alert("Seleccione un servicio");
            return;

        }

        if(!empleadoSeleccionado){

            alert("Seleccione un especialista");
            return;

        }

        if(!fecha){

            alert("Seleccione una fecha");
            return;

        }

        if(!horaSeleccionada){

            alert("Seleccione una hora");
            return;

        }

        const hora =
            horaSeleccionada.textContent.trim();

        const datos = {

           idUsuario: localStorage.getItem("usuarioId"),

            idServicio: servicio,

            idEmpleado: empleadoSeleccionado,

            fecha,

            hora

        };

        const respuesta = await fetch(
            "http://localhost:3000/api/citas",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(datos)
            }
        );

        const resultado =
            await respuesta.json();

        alert(resultado.mensaje);

        window.location.href =
            "../cliente/mis-citas.html";

    } catch(error){

        console.error(error);

        alert("Error al crear cita");

    }

}

</script>
</body>

</html>
